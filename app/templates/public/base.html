<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Noticias{% endblock %} · Radio Vívela</title>
<meta name="description" content="{% block description %}Noticias, novedades y contenido exclusivo de Radio Vívela.{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="/" class="brand"><span class="brand-mark"></span>Vívela <span style="color:var(--text-dim);font-weight:500;">· Noticias</span></a>
    <nav class="site-nav">
      <a href="/">Inicio</a>
      <a href="/noticias">Todas las noticias</a>
    </nav>
  </div>
</header>

{% block content %}{% endblock %}

<footer class="site-footer">
  <div class="wrap">© <span id="y"></span> Radio Vívela — Blog de noticias</div>
</footer>
<script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
